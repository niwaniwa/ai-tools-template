name: Document Lint

on:
  push:
    paths:
      - "docs/**/*.md"
  pull_request:
    paths:
      - "docs/**/*.md"

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate document frontmatter
        run: bash scripts/validate-docs.sh
